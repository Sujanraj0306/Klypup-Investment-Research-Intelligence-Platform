<!doctype html>
<html lang="en" data-theme="dark" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="icon"
      href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='7' fill='%233B82F6'/><text x='16' y='22' font-family='Inter,system-ui' font-size='18' font-weight='700' text-anchor='middle' fill='white'>K</text></svg>"
    />
    <title>Klypup — Investment Research Intelligence</title>
    <script>
      // Apply saved theme (or OS preference) before first paint to avoid a flash.
      (function () {
        try {
          var saved = localStorage.getItem('klypup-theme');
          var prefersLight = window.matchMedia('(prefers-color-scheme: light)').matches;
          var theme = saved === 'light' || saved === 'dark'
            ? saved
            : (prefersLight ? 'light' : 'dark');
          document.documentElement.setAttribute('data-theme', theme);
          document.documentElement.classList.toggle('dark', theme === 'dark');
          document.documentElement.classList.toggle('light', theme === 'light');
        } catch (_) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
